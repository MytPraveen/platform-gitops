apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://openebs.github.io/openebs
    chart: openebs
    targetRevision: 4.3.2

  destination:
    server: https://kubernetes.default.svc
    namespace: openebs

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true